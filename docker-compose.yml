services:
  backend:
    build:
      context: ./backend
    container_name: azscout-backend
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      AZSCOUT_DATABASE_URL: sqlite:////data/azscout.db
    volumes:
      - azscout-data:/data
      - ${HOME}/.azure:/root/.azure:ro
    networks:
      - azscout-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
    container_name: azscout-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - azscout-net

volumes:
  azscout-data:

networks:
  azscout-net:
    driver: bridge
